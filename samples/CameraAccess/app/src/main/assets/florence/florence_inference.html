<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Florence Inference</title>
</head>
<body>
<!-- Patch fetch+XHR BEFORE the module script loads Transformers.js.
     Regular scripts run before deferred module scripts, so Transformers.js
     will capture our patched version when it evaluates. -->
<script>
  (function() {
    var _origFetch = window.fetch.bind(window);
    window.fetch = function(input, init) {
      var url = (input && typeof input === 'object' && 'url' in input) ? input.url : String(input);
      AndroidBridge.onModelProgress('fetch▶ ' + url);
      return _origFetch(input, init).then(function(r) {
        AndroidBridge.onModelProgress('fetch◀ ' + r.status + ' ok=' + r.ok
          + ' len=' + r.headers.get('content-length') + '  ' + url);
        return r;
      }, function(e) {
        AndroidBridge.onModelProgress('fetch✖ ' + e.constructor.name + ': ' + e.message + '  ' + url);
        throw e;
      });
    };

    var _origOpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url) {
      AndroidBridge.onModelProgress('xhr▶ ' + method + ' ' + url);
      return _origOpen.apply(this, arguments);
    };
  })();
</script>

<script type="module">
  /**
   * Florence-2 inference page for Android WebView.
   * Models are served by the loopback AssetServer in FlorenceProcessor.kt.
   * Transformers.js is loaded from jsDelivr CDN (cached by WebView after first load).
   *
   * Key: Transformers.js v3 does NOT accept a full URL in from_pretrained().
   * Instead, set env.localModelPath to the server base and use just the
   * model folder name ('florence').  Transformers.js then constructs:
   *   env.localModelPath + MODEL_NAME + '/' + filename
   * which resolves to http://localhost:<port>/models/florence/<filename>.
   */

  const MODEL_NAME = 'florence';
  const TASK = '<DENSE_REGION_CAPTION>';

  import {
    Florence2ForConditionalGeneration,
    AutoProcessor,
    AutoTokenizer,
    RawImage,
    env,
    full,
  } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.min.js';

  // Point Transformers.js at our loopback asset server.
  // FlorenceProcessor.kt replaces this placeholder with the real port at runtime.
  env.localModelPath  = 'https://appassets.androidplatform.net/assets/models/';
  env.allowLocalModels  = true;
  env.allowRemoteModels = false;  // MODEL_NAME is not a HF Hub ID — skip Hub entirely
  env.useBrowserCache   = false;  // don't serve stale files from Cache Storage

  let model = null;
  let processor = null;
  let tokenizer = null;

  async function init() {
    try {
      // ── Sanity-check the server is reachable ──────────────────────────────
      AndroidBridge.onModelProgress('localModelPath=' + env.localModelPath);
      const MODEL_BASE = env.localModelPath + MODEL_NAME + '/';
      AndroidBridge.onModelProgress('Pre-flight: ' + MODEL_BASE);
      for (const f of ['config.json','preprocessor_config.json','tokenizer_config.json']) {
        try {
          const r = await fetch(MODEL_BASE + f);
          AndroidBridge.onModelProgress('  ' + f + ': ' + r.status + ' len=' + r.headers.get('content-length'));
        } catch (e) {
          AndroidBridge.onModelProgress('  ' + f + ': FAIL ' + e.message);
        }
      }

      // ── Load processor & tokenizer ────────────────────────────────────────
      AndroidBridge.onModelProgress('Loading AutoProcessor…');
      try {
        processor = await AutoProcessor.from_pretrained(MODEL_NAME, { local_files_only: true });
        AndroidBridge.onModelProgress('AutoProcessor: OK');
      } catch (e) {
        AndroidBridge.onModelProgress('AutoProcessor FAIL: ' + e.message + ' || ' + (e.stack || '').slice(0, 300));
        throw e;
      }

      AndroidBridge.onModelProgress('Loading AutoTokenizer…');
      try {
        tokenizer = await AutoTokenizer.from_pretrained(MODEL_NAME, { local_files_only: true });
        AndroidBridge.onModelProgress('AutoTokenizer: OK');
      } catch (e) {
        AndroidBridge.onModelProgress('AutoTokenizer FAIL: ' + e.message + ' || ' + (e.stack || '').slice(0, 300));
        throw e;
      }

      // ── Load vision model ─────────────────────────────────────────────────
      // Dtypes match exactly what onnx-community/Florence-2-base-ft downloads
      // in the HuggingFace WebGPU demo on Android Edge (confirmed from network log).
      const dtype = {
        embed_tokens:        'fp16',  // → embed_tokens_fp16.onnx
        vision_encoder:      'fp16',  // → vision_encoder_fp16.onnx
        encoder_model:       'q4',    // → encoder_model_q4.onnx
        decoder_model_merged:'q4',    // → decoder_model_merged_q4.onnx
      };

      AndroidBridge.onModelProgress('Loading vision model (WebGPU)…');
      try {
        model = await Florence2ForConditionalGeneration.from_pretrained(MODEL_NAME, {
          dtype,
          device: 'webgpu',
          local_files_only: true,
        });
        AndroidBridge.onModelProgress('Vision model: WebGPU OK');
      } catch (e) {
        AndroidBridge.onModelProgress('Vision model FAIL: ' + e.message + ' || ' + (e.stack || '').slice(0, 300));
        throw e;
      }

      // ── Warm-up pass (matches reference implementation exactly) ───────────
      AndroidBridge.onModelProgress('Warming up…');
      const dummyText   = tokenizer('a');
      const dummyVision = full([1, 3, 768, 768], 0.0);
      await model.generate({
        ...dummyText,
        pixel_values: dummyVision,
        max_new_tokens: 1,
      });

      AndroidBridge.onModelReady();
      // Fire-and-forget: run <CAPTION> on the known-good beetle.png so we can
      // verify the whole pipeline works before touching any live camera frame.
      runSanityCheck();
    } catch (e) {
      AndroidBridge.onError('Init failed: ' + e.message);
    }
  }

  async function runSanityCheck() {
    try {
      AndroidBridge.onModelProgress('Sanity: fetching beetle.png…');
      const resp = await fetch(env.localModelPath + 'florence/beetle.png');
      const blob = await resp.blob();
      const dataUrl = await new Promise(res => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result);
        reader.readAsDataURL(blob);
      });

      const image = await RawImage.fromURL(dataUrl);
      AndroidBridge.onModelProgress('Sanity: image ' + image.width + '×' + image.height);

      const prompt  = processor.construct_prompts('<CAPTION>');
      const textInputs   = tokenizer(prompt, { padding: true, truncation: true });
      const visionInputs = await processor(image);

      const generatedIds = await model.generate({
        ...textInputs,
        ...visionInputs,
        max_new_tokens: 256,
        num_beams: 3,
        do_sample: false,
      });

      const generatedText = tokenizer.batch_decode(generatedIds, { skip_special_tokens: false })[0];
      AndroidBridge.onModelProgress('Sanity raw text (' + generatedText.length + ' chars): ' + generatedText.slice(0, 200));
      const result = processor.post_process_generation(generatedText, '<CAPTION>', image.size);
      AndroidBridge.onModelProgress('Sanity result: ' + JSON.stringify(result));
    } catch (e) {
      AndroidBridge.onModelProgress('Sanity FAILED: ' + e.message + ' || ' + (e.stack || '').slice(0, 200));
    }
  }

  /**
   * Run Florence-2 dense region captioning on a data-URL image.
   * Called from Kotlin via evaluateJavascript().
   */
  /**
   * Run Florence-2 inference for any supported task.
   *
   * @param imageDataUrl  data:image/jpeg;base64,… string
   * @param task          Florence task token, e.g. '<DENSE_REGION_CAPTION>'.
   *                      Defaults to the module-level TASK constant.
   * @param extraPrompt   Optional text prompt required by tasks such as
   *                      <CAPTION_TO_PHRASE_GROUNDING>, <REGION_TO_DESCRIPTION>,
   *                      <REGION_TO_SEGMENTATION>, <OPEN_VOCABULARY_DETECTION>.
   *                      Pass null or omit for image-only tasks.
   *
   * Result shape varies by task — Kotlin callers must parse accordingly:
   *   bbox tasks  (<OD>, <DENSE_REGION_CAPTION>, <REGION_PROPOSAL>,
   *                <CAPTION_TO_PHRASE_GROUNDING>, <OPEN_VOCABULARY_DETECTION>):
   *       { "<TASK>": { bboxes: [[x1,y1,x2,y2],…], labels: ["…",…] } }
   *   segmentation tasks  (<REGION_TO_SEGMENTATION>,
   *                        <REFERRING_EXPRESSION_SEGMENTATION>):
   *       { "<TASK>": { polygons: [[[x,y],…],…], labels: ["…",…] } }
   *   string tasks  (<CAPTION>, <DETAILED_CAPTION>, <MORE_DETAILED_CAPTION>,
   *                  <REGION_TO_DESCRIPTION>, <OCR>):
   *       { "<TASK>": "plain text" }
   *   OCR with region:
   *       { "<OCR_WITH_REGION>": { quad_boxes: […], labels: ["…",…] } }
   */
  window.runInference = async function(imageDataUrl, task, extraPrompt) {
    if (!model || !processor || !tokenizer) {
      AndroidBridge.onError('Model not ready');
      return;
    }
    const activeTask = task || TASK;
    try {
      const image       = await RawImage.fromURL(imageDataUrl);
      AndroidBridge.onModelProgress('Image loaded: ' + image.width + '×' + image.height
        + '  task=' + activeTask
        + (extraPrompt ? '  prompt="' + extraPrompt.slice(0, 60) + '"' : ''));

      const prompt      = processor.construct_prompts(activeTask, extraPrompt || undefined);
      const textInputs  = tokenizer(prompt, { padding: true, truncation: true });
      const visionInputs = await processor(image);
      AndroidBridge.onModelProgress('Inputs ready — calling model.generate…');

      const generatedIds = await model.generate({
        ...textInputs,
        ...visionInputs,
        max_new_tokens: 1024,
        num_beams: 3,
        do_sample: false,
      });

      const seqLen = generatedIds[0]
        ? generatedIds[0].length
        : (generatedIds.dims ? generatedIds.dims[generatedIds.dims.length - 1] : '?');
      AndroidBridge.onModelProgress('Generated ' + seqLen + ' token(s)');

      const generatedText = tokenizer.batch_decode(generatedIds, {
        skip_special_tokens: false,
      })[0];

      AndroidBridge.onModelProgress('GeneratedText (' + generatedText.length + ' chars): '
        + generatedText.slice(0, 300));

      let result;
      try {
        result = processor.post_process_generation(
          generatedText,
          activeTask,
          image.size,
        );
      } catch (ppErr) {
        AndroidBridge.onModelProgress('post_process_generation FAILED: ' + ppErr.message);
        // Transformers.js does not yet implement polygon post-processing for
        // segmentation tasks.  The model does generate correct <loc_N> tokens,
        // so we decode them manually: pairs of loc values → [x, y] pixel coords.
        const isSegTask = activeTask === '<REGION_TO_SEGMENTATION>'
                       || activeTask === '<REFERRING_EXPRESSION_SEGMENTATION>';
        if (!isSegTask) throw ppErr;

        const locNums = [...generatedText.matchAll(/<loc_(\d+)>/g)]
                          .map(m => parseInt(m[1]));
        const polygon = [];
        for (let i = 0; i + 1 < locNums.length; i += 2) {
          polygon.push([
            locNums[i]     / 999 * image.width,
            locNums[i + 1] / 999 * image.height,
          ]);
        }
        result = {
          [activeTask]: {
            polygons: polygon.length >= 3 ? [polygon] : [],
            labels: [''],
          },
        };
        AndroidBridge.onModelProgress('Polygons (manual decode): ' + result[activeTask].polygons.length
          + ' polygon(s), ' + polygon.length + ' pts');
      }

      // Log a concise summary regardless of result shape.
      const taskResult = result[activeTask];
      if (taskResult && typeof taskResult === 'object') {
        if (taskResult.bboxes)    AndroidBridge.onModelProgress('Regions: ' + taskResult.bboxes.length);
        else if (taskResult.polygons) AndroidBridge.onModelProgress('Polygons: ' + taskResult.polygons.length);
        else if (taskResult.quad_boxes) AndroidBridge.onModelProgress('OCR boxes: ' + taskResult.quad_boxes.length);
      } else if (typeof taskResult === 'string') {
        AndroidBridge.onModelProgress('String result (' + taskResult.length + ' chars): ' + taskResult.slice(0, 100));
      }

      AndroidBridge.onInferenceResult(JSON.stringify(result));
    } catch (e) {
      AndroidBridge.onError('Inference failed: ' + e.message
        + ' || ' + (e.stack || '').slice(0, 400));
    }
  };

  init();
</script>
</body>
</html>
